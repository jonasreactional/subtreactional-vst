name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}

      # JUCE 7.0.12 uses CGWindowListCreateImage which was removed in macOS 15.
      # Patch it out at build time (unused screenshot helpers).
      - name: Patch JUCE for macOS 15
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd external/JUCE
          git apply ../../.github/patches/juce-remove-cgwindowlist.patch

      # Linux: install JUCE dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libfreetype-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libcurl4-openssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web UI
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          -DCMAKE_CXX_FLAGS="-Wno-error=return-type"
          -DCMAKE_C_FLAGS="-Wno-error=return-type"

      - name: Configure (Linux/Windows)
        if: runner.os != 'macOS'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Subtreactional-${{ matrix.name }}-VST3
          path: build/SubtreactionalVST_artefacts/Release/VST3/Subtreactional.vst3
