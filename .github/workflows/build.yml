name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            cmake_flags: ""
          - os: ubuntu-latest
            name: Linux
            cmake_flags: ""
          - os: windows-latest
            name: Windows
            cmake_flags: ""

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.SUBMODULE_SSH_KEY }}

      # Linux: install JUCE dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfreetype6-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libwebkit2gtk-4.1-dev \
            libcurl4-openssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web UI
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3 (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Subtreactional-macOS-VST3
          path: build/SubtreactionalVST_artefacts/Release/VST3/Subtreactional.vst3

      - name: Upload VST3 (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Subtreactional-Linux-VST3
          path: build/SubtreactionalVST_artefacts/Release/VST3/Subtreactional.vst3

      - name: Upload VST3 (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Subtreactional-Windows-VST3
          path: build/SubtreactionalVST_artefacts/Release/VST3/Subtreactional.vst3
